general:
  log_level: DEBUG
  open_camera_windows: false
# define each camera properties and their role
cameras:
  - URI: rtsp://admin:Latika1405@192.168.1.64:554/Streaming/Channels/102
    can_register: true
  - URI: /dev/video0
    can_register: false
# settings related to machine vision
vision_setting:
  face_DB_path: data/face_embeddings.sqlite3
  models_path: models/
  # these params has effect of performance
  skip_n_frames: 5
  interval_sec: 0.01 
  camera_reconnect_interval_sec: 5.0
  camera_status_interval_sec: 10.0
  #####
  # crop setting 
  crop:
    tl_reduce_pct: [20, 20]
    br_reduce_pct: [20, 10]
  # settings related to detection
  detection:
    conf_thresh: 0.75
    nms_thresh: 0.6
    top_k: 10
    # settings about how much of frame to crop and use in vision models

    model_name: yunet
  # settings related to recognition
  recognition:
    conf_thresh: 0.75
    similarity_func: cosine
    model_name: sface
    after_recognition_delay: 3
# health-check settings 
health_check:
  enabled: true
  push_to_server: false
  route: ""
  interval_sec: 5
# settings related to websocket
websocket_server:
  url: "ws://127.0.0.1:8888"

performance:
  # Conservative defaults from instrunctions.md for Core i5 Gen7 class CPUs.
  max_fps_single_camera: 8.0
  max_fps_2_3_cameras: 5.0
  max_fps_4_5_cameras: 2.0
  max_fps_more_cameras: 1.0
  enrollment_fps: 8.0
  frame_resize_width: 640
  opencv_threads_per_process: 1
