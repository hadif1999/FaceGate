name: Build Linux Binary

on:
  push:
    branches:
      - linux
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      UV_DEFAULT_INDEX: https://pypi.org/simple

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux runtime packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --python 3.12

      - name: Compile Python sources
        run: uv run python -m compileall main.py src

      - name: Validate config
        run: uv run python -c "from src.config import ConfigManager; ConfigManager.read_multiple_config_files('config.yaml'); print('config ok')"

      - name: Build one-file binaries
        run: |
          uv run --with pyinstaller pyinstaller --clean --noconfirm gym_vision.spec
          uv run --with pyinstaller pyinstaller --clean --noconfirm test_ws_server_gui.spec

      - name: Prepare dist folder
        run: |
          cp config.yaml dist/config.yaml
          chmod +x dist/gym_vision
          chmod +x dist/test_ws_server_gui
          test -f dist/gym_vision
          test -f dist/test_ws_server_gui
          test -f dist/config.yaml

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: facegate-linux-dist
          path: dist/

      - name: Publish latest Linux release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: linux-latest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG_NAME" "$GITHUB_SHA"
          git push -f origin "$TAG_NAME"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release delete "$TAG_NAME" --yes
          fi

          NOTES="Automated Linux build for commit $GITHUB_SHA
          Branch: $GITHUB_REF_NAME
          Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

          gh release create "$TAG_NAME" dist/gym_vision dist/test_ws_server_gui dist/config.yaml \
            --verify-tag \
            --target "$GITHUB_SHA" \
            --title "Linux Latest Build" \
            --notes "$NOTES" \
            --latest=false
